name: Update RxDB Commit

on:
  workflow_dispatch:
  schedule:
    # Hourly check for new commits on rxdb master
    - cron: '0 * * * *'
  # Triggered by the rxdb repo via GitHub API on each push to master:
  # curl -X POST https://api.github.com/repos/pubkey/rxdb-server/dispatches \
  #   -H "Authorization: token <PAT>" \
  #   -d '{"event_type":"rxdb-master-update"}'
  repository_dispatch:
    types: [rxdb-master-update]

# Ensure only one instance runs at a time
concurrency:
  group: update-rxdb
  cancel-in-progress: true

jobs:
  update-rxdb:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get current rxdb commit from package.json
        id: current
        run: |
          CURRENT=$(node -e "console.log(require('./package.json').devDependencies.rxdb)")
          CURRENT_SHA="${CURRENT##*#}"
          echo "spec=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

      - name: Get latest rxdb master commit sha
        id: latest
        run: |
          LATEST_SHA=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/pubkey/rxdb/commits/master \
            | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).sha))")
          echo "sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"

      - name: Determine whether to update
        id: target
        run: |
          if [ "${{ steps.current.outputs.sha }}" = "${{ steps.latest.outputs.sha }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update package.json
        if: steps.target.outputs.changed == 'true'
        run: |
          TARGET="github:pubkey/rxdb#${{ steps.latest.outputs.sha }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8'));
            pkg.devDependencies.rxdb = '$TARGET';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n', 'utf-8');
          "

      - name: Commit and push
        if: steps.target.outputs.changed == 'true'
        run: |
          SHORT="${{ steps.latest.outputs.sha }}"
          SHORT="${SHORT:0:7}"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: update rxdb to pubkey/rxdb@$SHORT"
          git push
